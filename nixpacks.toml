[phases.setup]
# Python + Node para build do frontend
nixPkgs = ["python311", "nodejs_20", "npm"]

[phases.install]
cmds = [
  "python -m venv /app/.venv",
  ". /app/.venv/bin/activate && pip install -r requirements.txt",
  "cd frontend && npm install",
  "cd frontend && npm run build"
]

[phases.start]
cmd = "gunicorn src.api.main:app -k uvicorn.workers.UvicornWorker -w ${WEB_CONCURRENCY:-2} -b 0.0.0.0:${PORT:-8000} --timeout 120 --graceful-timeout 30"
