<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="500" r="120" fill="rgba(255,255,255,0.05)"/>

  <!-- Database icon (simplified) -->
  <g transform="translate(150, 120)">
    <!-- Cylinder top -->
    <ellipse cx="50" cy="20" rx="45" ry="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    <!-- Cylinder body -->
    <rect x="5" y="20" width="90" height="60" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    <!-- Cylinder bottom -->
    <ellipse cx="50" cy="80" rx="45" ry="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    <!-- Data lines -->
    <line x1="20" y1="35" x2="80" y2="35" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="20" y1="65" x2="80" y2="65" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  </g>

  <!-- Main text -->
  <text x="600" y="200" font-family="Sora, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">
    68 Milhões
  </text>

  <text x="600" y="280" font-family="Sora, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">
    de CNPJs
  </text>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="Sora, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.85)" text-anchor="middle">
    via API da Receita Federal
  </text>

  <!-- Accent bar -->
  <rect x="200" y="380" width="800" height="4" fill="url(#accentGradient)"/>

  <!-- Brand name -->
  <text x="600" y="450" font-family="Sora, sans-serif" font-size="48" font-weight="600" fill="white" text-anchor="middle">
    DB Empresas
  </text>

  <!-- Tagline -->
  <text x="600" y="510" font-family="Sora, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    Consulta completa em milissegundos. Comece grátis, sem cartão.
  </text>

  <!-- Badge/seal -->
  <circle cx="1050" cy="80" r="45" fill="rgba(16, 185, 129, 0.9)"/>
  <text x="1050" y="90" font-family="Sora, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">
    100%
  </text>
  <text x="1050" y="108" font-family="Sora, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">
    Oficial
  </text>
</svg>
